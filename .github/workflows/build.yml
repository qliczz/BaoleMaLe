name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Download Dalamud distribution
        shell: bash
        run: |
          curl -sL "https://raw.githubusercontent.com/goatcorp/dalamud-distrib/main/api15/latest.zip" -o latest.zip
          unzip -o latest.zip -d "$GITHUB_WORKSPACE/dalamud_dist"

      - name: Build
        shell: bash
        env:
          DALAMUD_HOME: ${{ github.workspace }}/dalamud_dist
        run: |
          cd BaoleMaLe
          dotnet build -c Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaoleMaLe
          path: BaoleMaLe/bin/BaoleMaLe/latest.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: BaoleMaLe/bin/BaoleMaLe/latest.zip
